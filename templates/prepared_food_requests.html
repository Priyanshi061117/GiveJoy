<!DOCTYPE html>
<html>
<head>
    <title>Prepared Food Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">GiveJoy</span>
        <a href="/dashboard" class="btn btn-light btn-sm">Back</a>
    </div>
</nav>

<div class="container py-5">

    <h3 class="mb-4">Nearby Food Donations </h3>

    <table class="table table-bordered text-center">
        <thead class="table-success">
            <tr>
                <th>Item</th>
                <th>Quantity</th>
                <th>Prepared Time</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
        {% for f in data %}
            <tr>
                <td>{{ f.item_name }}</td>
                <td>{{ f.quantity }}</td>
                <td>{{ f.prepared_time }}</td>
                <td>
                    <a href="/accept_prepared_food/{{ f.id }}" class="btn btn-success">
                        Accept
                    </a>
                </td>
            </tr>
        {% endfor %}
        </tbody>

    </table>

</div>

</body>
</html>
