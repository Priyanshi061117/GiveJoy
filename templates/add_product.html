<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins';
            background: #f5f7fa;
            margin: 0;
        }


        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #28a745;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #218838;
        }
    </style>
</head>

<body>

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
        }
    </style>

<nav class="navbar navbar-dark bg-success py-2">
    <div class="container-fluid px-3 d-flex justify-content-between">

        <!-- Left -->
        <span class="navbar-brand mb-0 fs-5">GiveJoy</span>


    </div>
</nav>

<div class="container">
    
    <div class="card">
        <h2 class="mb-3text-center">List Product</h2>

        <form action="/add_product" method="POST" enctype="multipart/form-data">

            <input type="text" name="name" placeholder="Product Name" required>

            <textarea name="description" placeholder="Description"></textarea>

            <input type="number" name="price" placeholder="Price" required>

            <input type="number" name="stock" placeholder="Stock">

            <input type="file" name="image" required>

            <button type="submit">Add Product</button>

        </form>

    </div>
</div>

</body>
</html>
