<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Buy Product</title>

    <style>
        body {
            font-family: 'Poppins';
            margin: 0;
            background: #f5f7fa;
        }

        nav {
            background: #ff6b6b;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            color: white;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 85vh;
        }

        .card {
            background: white;
            width: 500px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        img {
            width: 100%;
            height: 250px;
            object-fit: contain;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #ff6b6b;
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            margin-top: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #ff4d4d;
        }
    </style>
</head>

<body>

<nav>
    <a href="/browse_products">Back</a>
    <h3>Buy Product</h3>
    <div></div>
</nav>

<div class="container">
    <div class="card">

        <img src="{{ url_for('static', filename=product.image) }}">

        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>

        <h3>₹{{ product.price }}</h3>

        <form action="/place_order" method="POST">
            <input type="hidden" name="product_id" value="{{ product.id }}">

            <input type="number" name="quantity" value="1" min="1">

            <p><b>Cash on Delivery</b></p>

            <button type="submit">Place Order</button>
        </form>

    </div>
</div>

</body>
</html>
