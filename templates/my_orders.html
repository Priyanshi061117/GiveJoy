<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial;
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
        }

        table {
            width: 95%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #28a745;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
            color: black;
        }
    </style>
</head>

<body>

<!-- ✅ FIXED NAVBAR -->
<nav class="navbar navbar-dark bg-success py-2">
    <div class="container-fluid px-3 d-flex justify-content-between align-items-center">

        <!-- Left -->
        <span class="navbar-brand mb-0 fs-5">GiveJoy</span>

        <!-- Center -->
        <span class="text-white fw-semibold">My Orders</span>

        <!-- Right -->
        <button onclick="history.back()" class="btn btn-light btn-sm px-2 py-1" style="font-size: 12px;">
            Back
        </button>

    </div>
</nav>

<!-- ✅ CONTENT -->
{% if orders %}
<table>
    <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Status</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.product_name }}</td>
        <td>{{ order.quantity }}</td>
        <td>₹{{ order.total_amount }}</td>
        <td>{{ order.status }}</td>
    </tr>
    {% endfor %}
</table>

{% else %}
<div class="empty">No orders yet 😢</div>
{% endif %}

</body>
</html>
