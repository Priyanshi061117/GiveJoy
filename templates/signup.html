<!DOCTYPE html>
<html>
<head>
    <title>Signup - GiveJoy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script>
        function toggleCategory() {
            var role = document.getElementById("role").value;
            var categoryDiv = document.getElementById("categoryDiv");
            categoryDiv.style.display = role === "ngo" ? "block" : "none";
        }
    </script>
    <style>
        body {
            background: url("{{ url_for('static', filename='images/bg2.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }
        .overlay {
            background: rgba(0, 0, 0, 0.5);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        </style>
</head>
<body class="bg-light">

<div class="container py-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h3 class="text-center mb-4 text-success">Join GiveJoy </h3>

        <form method="POST">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" name="name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Role</label>
                <select name="role" id="role" onchange="toggleCategory()" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="donor">Donor</option>
                    <option value="ngo">NGO</option>
                </select>
            </div>

            <div id="categoryDiv" style="display:none;" class="mb-3">
                <label>NGO Category</label>
                <select name="category" class="form-select">
                    <option value="orphanage">Orphanage</option>
                    <option value="disaster_relief">Disaster Relief</option>
                    <option value="food_bank">Food Bank</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Latitude</label>
                <input type="text" name="latitude" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Longitude</label>
                <input type="text" name="longitude" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">Create Account</button>
        </form>

        <div class="text-center mt-3">
            <small>Already have an account? <a href="/login">Login</a></small>
        </div>
    </div>
</div>

</body>
</html>
