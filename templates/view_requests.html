<!DOCTYPE html>
<html>

<head>
<title>NGO Requests</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-success">
<div class="container">
<span class="navbar-brand">GiveJoy</span>
<a href="/dashboard" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<h3 class="mb-4">NGOs Needing Help</h3>

<table class="table table-bordered table-striped">

<thead class="table-success">
<tr>
<th style="width:200px;">NGO</th>
<th>Item Needed</th>
<th>Quantity</th>
<th>Urgency</th>
<th>Distance (km)</th>
<th>Date Posted</th>
</tr>
</thead>

<tbody>

{% for r in requests %}

<tr>
<td>{{ r.name }}</td>
<td>{{ r.item_required }}</td>
<td>{{ r.quantity_needed }}</td>
<td>{{ r.urgency_level }}</td>
<td>{{ r.distance }}</td>
<td>{{ r.date_posted }}</td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
