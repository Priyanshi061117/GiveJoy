<!DOCTYPE html>
<html>
<head>
    <title>Donor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
        }
    </style>
    

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">GiveJoy </span>
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">Welcome {{ name }} </h2>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <a href="/view_requests" class="btn btn-success">View NGO Requests</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <a href="/donate_item" class="btn btn-success">Donate Items</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center">
                <h5>Track Donations</h5>
            </div>
        </div>
    </div>
</div>

</body>
</html>
