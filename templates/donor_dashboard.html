<!DOCTYPE html>
<html>
<head>
    <title>Donor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
        }
    
        h2 {
            color: black; 
        }
    </style>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <span class="navbar-brand">GiveJoy</span>
        <a href="/logout" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<div class="container py-5">
    <h2 class="mb-4">Welcome {{ name }}</h2>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/view_requests" class="btn btn-success w-100 fw-bold">View NGO Requests</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/donate_item" class="btn btn-success w-100 fw-bold">Donate Items</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/my_donations" class="btn btn-success w-100 fw-bold">My Donations</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/prep_food" class="btn btn-success w-100 fw-bold">Donate Prepared Food</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/browse_products" class="btn btn-success w-100 fw-bold">Browse Marketplace</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow p-4 text-center bg-white">
                <a href="/my_orders" class="btn btn-success w-100 fw-bold">My Orders</a>
            </div>
        </div>



    </div>
</div>

</body>
</html>
