<!DOCTYPE html>
<html>
<head>
    <title>GiveJoy</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: url("{{ url_for('static', filename='images/bg2.jpg') }}") no-repeat center center fixed;
            background-size: cover;
        }

        /* Dark overlay for premium look */
        .overlay {
            height: 100vh;
            width: 100%;
            background: rgba(0,0,0,0.55);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.95);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            animation: fadeIn 1s ease;
        }

        h1 {
            font-weight: 700;
            color: #198754;
            margin-bottom: 10px;
        }

        .tagline {
            color: #555;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .btn-main {
            border-radius: 10px;
            padding: 12px;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-login {
            background: #198754;
            color: white;
        }

        .btn-login:hover {
            background: #157347;
        }

        .btn-signup {
            background: #ffffff;
            border: 2px solid #198754;
            color: #198754;
        }

        .btn-signup:hover {
            background: #198754;
            color: white;
        }

        .logo {
            font-size: 22px;
            font-weight: 600;
            color: #198754;
            margin-bottom: 5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="box">

        <!-- Logo / Brand -->
        <div class="logo">💚 GiveJoy</div>

        <!-- Heading -->
        <h1>Make Giving Smarter</h1>

        <!-- Tagline -->
        <p class="tagline">
            Connect with NGOs, donate what matters, and make a real impact in your community.
        </p>

        <!-- Buttons -->
        <div class="d-grid gap-3">
            <a href="/login" class="btn btn-main btn-login">Login</a>
            <a href="/signup" class="btn btn-main btn-signup">Create Account</a>
        </div>

    </div>

</div>

</body>
</html>
