<!DOCTYPE html>
<html>

<head>
    <title>Donate Prepared Food</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<style>
    body {
        background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
        background-size: cover;
    }
</style>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-success">
    <div class="container">
        <span class="navbar-brand">GiveJoy</span>
        <a href="/dashboard" class="btn btn-light btn-sm">Back</a>
    </div>
</nav>

<!-- FORM CARD -->
<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width:500px">

        <h3 class="text-center mb-4">Donate Prepared Food</h3>

        <!-- ERROR MESSAGE -->
        {% if error %}
        <div class="alert alert-danger text-center">
            {{ error }}
        </div>
        {% endif %}

        <!-- SUCCESS MESSAGE -->
        {% if success %}
        <div class="alert alert-success text-center">
            {{ success }}
        </div>
        {% endif %}

        <form method="POST">

            <!-- ITEM NAME -->
            <div class="mb-3">
                <label class="form-label">Food Item</label>
                <input type="text" name="item_name" class="form-control" 
                       placeholder="e.g. Rice, Dal, Sandwiches" required>
            </div>

            <!-- QUANTITY -->
            <div class="mb-3">
                <label class="form-label">Quantity (approx servings)</label>
                <input type="number" name="quantity" class="form-control" 
                       placeholder="e.g. 10 people" required>
            </div>

            <!-- PREPARATION TIME -->
            <div class="mb-3">
                <label class="form-label">Prepared At</label>
                <input type="datetime-local" name="prepared_time" class="form-control" required>
            </div>

            <!-- NOTES -->
            <div class="mb-3">
                <label class="form-label">Additional Notes (optional)</label>
                <textarea name="notes" class="form-control" rows="3"
                    placeholder="Spicy level, contains nuts, etc."></textarea>
            </div>

            <!-- SUBMIT -->
            <button class="btn btn-warning w-100">
                Donate Now 
            </button>

        </form>

    </div>
</div>

</body>
</html>
