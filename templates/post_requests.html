<!DOCTYPE html>
<html>
<head>
    <title>Post Request</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
            margin: 0;
        }

        .card {
            border-radius: 12px;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-dark bg-success py-2">
    <div class="container-fluid px-3 d-flex justify-content-between align-items-center">

        <!-- Left -->
        <span class="navbar-brand mb-0 fs-5">GiveJoy</span>

        <!-- Center -->
        <span class="text-white fw-semibold">Post Request</span>

        <!-- Right -->
        <button onclick="history.back()" class="btn btn-light btn-sm px-2 py-1" style="font-size: 12px;">
            Back
        </button>

    </div>
</nav>

<!-- ✅ FORM -->
<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width:500px">

        <h4 class="text-center mb-4">Post Item Request</h4>

        <form method="POST">

            <div class="mb-3">
                <label class="form-label">Item Name</label>
                <input type="text" name="item_required" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" class="form-control" required>
            </div>

            <button class="btn btn-success w-100">Submit Request</button>

        </form>

    </div>

</div>

</body>
</html>
