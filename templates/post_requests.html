<!DOCTYPE html>
<html>
<head>
    <title>Post Request</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
        }
    </style>

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width:500px">

        <h3 class="text-center mb-4">Post Item Request</h3>

        <form method="POST">

            <div class="mb-3">
                <label>Item Name</label>
                <input type="text" name="item_required" class="form-control" required>
            </div>


            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" name="quantity" class="form-control" required>
            </div>


            <button class="btn btn-success w-100">Submit Request</button>

        </form>

    </div>

</div>

</body>
</html>
