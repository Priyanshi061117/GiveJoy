<!DOCTYPE html>
<html>

<head>
<title>Donate Items</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <style>
        body {
            background: url("{{ url_for('static', filename='images/dash_bg3.png') }}") no-repeat center center fixed;
            background-size: cover;
        }
    </style>
<nav class="navbar navbar-dark bg-success">
<div class="container">
<span class="navbar-brand">GiveJoy</span>
<a href="/dashboard" class="btn btn-light btn-sm">Back</a>
</div>
</nav>

<div class="container mt-5">

<div class="card shadow p-4 mx-auto" style="max-width:500px">

<h3 class="text-center mb-4">Donate Items</h3>

<form method="POST">

    <div class="mb-3">
        <label>Category</label>
        
        <select name="category"  class="form-control" required>
        
        <option value="">Select Category</option>
        
        <option value="Packaged Food">Packaged Food</option>
        <option value="Clothes">Clothes</option>
        <option value="Stationery">Stationery</option>
        <option value="Utensils">Utensils</option>
        <option value="Bedding">Beddings</option>
        <option value="Other">Other</option>
        
        </select>
        
        </div>



<div class="mb-3">
<label>Item Name</label>
<input type="text" name="item_name" class="form-control" required>
</div>

<div class="mb-3">
<label>Quantity</label>
<input type="number" name="quantity" class="form-control" required>
</div>





<button class="btn btn-success w-100">
Submit Donation
</button>

</form>

</div>

</div>

</body>
</html>
